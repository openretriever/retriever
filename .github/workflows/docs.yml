name: Docs

# Auto-build and deploy the Starlight docs site to Cloudflare Pages.
# main -> production (docs.openretriever domain / openretriever-docs project)
# other listed branches -> preview alias (<branch>.openretriever-docs.pages.dev)
#
# Requires two repo Actions secrets:
#   CLOUDFLARE_API_TOKEN   (Pages: Edit for the openretriever-docs project)
#   CLOUDFLARE_ACCOUNT_ID
# Without them, the build still runs and the deploy step is skipped.

on:
  push:
    branches:
      - main
      - docs/starlight-nova-v1
      - dev-docs
    paths:
      - docs-site/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

concurrency:
  group: docs-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build docs site
        working-directory: docs-site
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        if: ${{ github.event_name != 'pull_request' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/dist --project-name=openretriever-docs --branch=${{ github.ref_name }}
