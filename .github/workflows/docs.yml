name: Docs build check

# Docs are DEPLOYED by Cloudflare Pages' Git integration (connected in the
# Cloudflare dashboard), NOT from GitHub Actions — so NO Cloudflare secret lives
# in this repo. This workflow only *builds* the site to catch breakage on push/PR.
#
# Cloudflare Pages project settings to configure once, in the dashboard
# (Workers & Pages -> the docs project -> Settings -> Builds & deployments):
#   Production branch:        main
#   Root (monorepo) directory: docs-site
#   Build command:            npm install && npm run build
#   Build output directory:   dist          (i.e. docs-site/dist)
#   Node version:             pinned by docs-site/.node-version
# Pushes to other branches and pull requests get automatic preview deployments.

on:
  push:
    branches:
      - main
      - docs/starlight-nova-v1
    paths:
      - docs-site/**
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs-site/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: docs-site/.node-version
      - name: Build docs site
        working-directory: docs-site
        # `npm install`, not `npm ci`: astro's toolchain pulls wasm32-wasi
        # bindings whose nested @emnapi deps npm will not record into the
        # lockfile when it is generated on macOS, so `npm ci` fails on the
        # linux runner. Top-level deps are pinned exactly in package.json.
        run: |
          npm install --no-audit --no-fund
          npm run build
