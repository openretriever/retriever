name: CI

on:
  push:
    branches:
      - main
      # Release staging branches get full CI so they can be reviewed with
      # green checks before merging to main (release-branch-first flow).
      - release/**
      - docs/starlight-nova-v1
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true
      - name: Core tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pixi run python -m pytest tests -q
      - name: Release readiness smoke
        run: pixi run p1-reliability-gates && pixi run p0-release-readiness-full
      - name: Docs build
        run: pixi run -e docs docs-build
      - name: Package build
        run: pixi run build
