---
name: Runtime feature request
description: Propose a Retriever core runtime improvement
labels: [enhancement]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What robot/runtime problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed shape
      description: API, docs, example, or backend behavior you have in mind.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workaround, companion-repo approach, or reason this belongs in core.
