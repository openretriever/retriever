# =============================================================================
# Pixi Configuration for Retriever
# =============================================================================
#
# This file defines the pixi package manager configuration. It works alongside
# pyproject.toml - NOT a replacement for it.
#
# RELATIONSHIP WITH pyproject.toml:
#   - pyproject.toml: Defines the Python distribution (`pyretriever`) and its dependencies
#   - pixi.toml: Defines the development environment (conda + pypi packages)
#   - Pixi installs the local `pyretriever` distribution from pyproject.toml as an editable package
#   - Both files may specify overlapping deps (e.g., dora-rs) - this is fine,
#     the more restrictive version wins
#
# USAGE:
#   pixi run demo-dora-simple       # Run Dora demo in default environment
#   pixi shell                      # Enter interactive shell
#
# For more info: https://pixi.sh and docs/getting_started/install.md
# =============================================================================

[workspace]
# Using prefix.dev mirror for faster downloads
channels = ["https://prefix.dev/conda-forge"]
# Supported platforms: macOS ARM, Linux x64, and Windows x64
platforms = ["osx-arm64", "linux-64", "win-64"]

# =============================================================================
# Base Dependencies (installed via conda-forge)
# =============================================================================
[dependencies]
python = "3.11.*"
pip = "*"
ipython = "*"

mujoco = "*"
# mcp = ">=1.25.0,<2"  # Temporarily disabled - conflicts with fastapi/starlette versions


# =============================================================================
# Optional Feature: Rust Toolchain
# =============================================================================
[feature.rust.dependencies]
rust = "*"
maturin = "*"

# =============================================================================
# Optional Feature: C++ Toolchain
# =============================================================================
[feature.cpp.dependencies]
cmake = "*"
pkg-config = "*"

[feature.jax.pypi-dependencies]
jax = "*"
jaxlib = "*"
flax = "*"
optax = "*"

# =============================================================================
# Optional Feature: Pipeline Control System
# =============================================================================
[feature.docs.pypi-dependencies]
mkdocs = ">=1.6"
mkdocs-material = ">=9.5"
pymdown-extensions = ">=10"

[feature.control.pypi-dependencies]
pynput = "*"       # Global keyboard control
fastapi = ">=0.100.0"      # Web dashboard (need modern version)
uvicorn = "*"      # FastAPI server
qrcode = { version = "*", extras = ["pil"] }  # QR code for mobile access


# -----------------------------------------------------------------------------
# Environments
# -----------------------------------------------------------------------------
[environments]
default = { features = [] }
rust = { features = ["rust"] }
cpp = { features = ["cpp"] }
bindings = { features = ["rust", "cpp"] }
jax = { features = ["jax"] }
torch = { features = ["torch"] }
control = { features = ["control"] }  # Pipeline control with web dashboard + optional keyboard
docs = { features = ["docs"] }


# =============================================================================
# PyPI Dependencies
# =============================================================================
# Note: These are installed via uv after conda deps are resolved
[pypi-dependencies]

# Install the local pyretriever distribution from pyproject.toml.
# Keep the default environment lightweight, but include:
# - `dora`: dora backend support
# - `demo`: deps needed for the included examples (e.g. OpenCV + NumPy)
# - `web`: deps for web-based command interfaces (FastAPI)
# - `vision`: deps for real-time vision (PyTorch, Transformers)
pyretriever = { path = ".", editable = true, extras = [
    "dora",
    "demo",
    "web",
    "recording",
] }
rerun-sdk = ">=0.21.0" # 0.21+ for better MCAP support
mcap = "*" # MCAP recording support
google-genai = "*" # VLM Support
build = "*" # For building wheels


uvicorn = { extras = ["standard"], version = "*" }
# Test/runtime tooling (kept small; avoids pulling full `.[dev]` by default)
pytest = "*"
pygments = "*"
typing-extensions = "*"
werkzeug = "<3.0.0"

# Dora-rs pinned here to ensure version compatibility.
# Note: The Retriever dora backend currently uses a dataflow schema that may require
# a newer `dora` CLI than the one available in some package managers. If `dora start`
# rejects the generated YAML, see docs/getting_started/install.md for upgrade/build-from-source steps.
dora-rs = ">=0.3.12"
dora-rs-cli = ">=0.3.12"


# =============================================================================
# Tasks
# =============================================================================
[tasks]

# Build the wheel
# Run: pixi run build
build = "python -m build"

# Create distribution bundle (Wheel + Examples + Config)
# Run: pixi run package
package = "python scripts/release/package_dist.py"

# Documentation site
# Run: pixi run -e docs docs-build
docs-build = "mkdocs build --strict"
docs-serve = "mkdocs serve --dev-addr 127.0.0.1:8000"

# Test tasks
test = "python -m pytest tests/ -v"
test-control = "python -m pytest tests/test_control.py tests/test_control_web.py tests/test_adapter_reset.py tests/test_output_capture.py -v"

# Control System Demos
demo-control = { cmd = "python examples/control_demo.py", env = { PYTHONPATH = ".", RUST_LOG = "error" } }

# Tutorial Examples
demo-basic-flow = "python -m examples.tutorial.a_flow_fundamentals.01_basic_flow"
demo-clock-types = "python -m examples.tutorial.a_flow_fundamentals.02_clock_types"
demo-adapter-connection = "python -m examples.tutorial.a_flow_fundamentals.03_adapter_connection"
demo-full-pipeline = "python -m examples.tutorial.a_flow_fundamentals.04_full_pipeline"
demo-pipeline-ergonomics = "python -m examples.tutorial.a_flow_fundamentals.05_pipeline_ergonomics"
demo-context-graph = "python -m examples.tutorial.b_ir_and_execution.01_context_graph"
demo-ir-validation = "python -m examples.tutorial.b_ir_and_execution.02_ir_validation"
demo-execution-build = "python -m examples.tutorial.b_ir_and_execution.03_execution_build"
demo-rt-execution = "python -m examples.tutorial.b_ir_and_execution.04_rt_execution"
demo-webcam-detection = "python -m examples.tutorial.b_ir_and_execution.06_dora_perception --backend in-process --camera-mode real --visualize auto --duration 10"
demo-webcam-detection-dora = "python -m examples.tutorial.b_ir_and_execution.06_dora_perception --backend dora --fresh-dora --camera-mode real --visualize auto --duration 10"
demo-webcam-detection-mp-rerun = "python -m examples.tutorial.b_ir_and_execution.06_dora_perception --backend multiprocessing --camera-mode real --visualize rerun --duration 30"
demo-webcam-detection-dora-rerun = "python -m examples.tutorial.b_ir_and_execution.06_dora_perception --backend dora --fresh-dora --camera-mode real --visualize rerun --duration 30"
demo-webcam-stepper = "python -m examples.tutorial.c_debug_and_replay.03_debug_perception_stepper_real_camera --steps 10 --sleep 0.05"
demo-webcam-window = "python -m examples.tutorial.c_debug_and_replay.03_debug_perception_stepper_real_camera --steps 200 --sleep 0.05 --show-window"
demo-webcam-record = "python -m examples.tutorial.c_debug_and_replay.04_record_replay_perception record --camera-mode mock --out logs/perception.rrd --replay-out logs/perception.mcap --steps 10"
demo-webcam-replay-rrd = "python -m examples.tutorial.c_debug_and_replay.04_record_replay_perception replay --recording logs/perception.rrd --steps 10"
demo-webcam-replay-mcap = "python -m examples.tutorial.c_debug_and_replay.04_record_replay_perception replay --recording logs/perception.mcap --steps 10"
demo-stepper = "python -m examples.tutorial.c_debug_and_replay.01_debug_stepper"
demo-perception-stepper = "python -m examples.tutorial.c_debug_and_replay.02_debug_perception_stepper"
demo-buffer-engine = "python -m examples.tutorial.c_debug_and_replay.05_buffer_engine_demo"
