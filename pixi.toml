demo-feedback-intro = "python -m examples.tutorial.d_closed_loop_state_feedback.07_feedback_intro"
demo-belief-updater = "python -m examples.tutorial.d_closed_loop_state_feedback.05_belief_updater"
demo-stateful-replanning = "python -m examples.tutorial.d_closed_loop_state_feedback.12_stateful_replanning"
demo-multirate = "python -m examples.tutorial.e_resource_and_sync.01_multirate_window"
demo-synchronization = "python -m examples.tutorial.e_resource_and_sync.02_synchronization"
demo-multirate-robot-system = "python -m examples.tutorial.e_resource_and_sync.03_multirate_robot_system"
demo-strict-resource-fusion = "python -m examples.tutorial.e_resource_and_sync.04_strict_resource_fusion --case compatible"
demo-resource-hints = "python -m examples.tutorial.e_resource_and_sync.05_resource_hints --print-ir"
demo-data-multistream-join = "python -m examples.tutorial.e_resource_and_sync.07_data_multistream_join"
demo-dora-simple = "python -m examples.tutorial.b_ir_and_execution.05_dora_simple"
demo-backend-parity = "python -m examples.tutorial.b_ir_and_execution.09_backend_parity_benchmark"
demo-functional-fanin-fanout = "python -m examples.tutorial.e_resource_and_sync.06_functional_fanin_fanout --steps 6 --dt 0.1"
demo-deadline-mode-switch = "python -m examples.tutorial.d_closed_loop_state_feedback.13_deadline_aware_mode_switch --steps 16 --deadline-ms 8 --heavy-ms 14 --heavy-every 4 --miss-streak-limit 1"
demo-advanced-time-patterns = "python -m examples.tutorial.d_closed_loop_state_feedback.18_advanced_time_patterns --steps 20 --dt 0.2"
demo-trace-contract = "python -m examples.tutorial.c_debug_and_replay.06_trace_contract_basics"
demo-manifest-lineage = "python -m examples.tutorial.h_release_readiness.01_run_manifest_and_lineage demo"
demo-policy-backends = "python -m examples.tutorial.f_policy_backends.01_closed_loop_policy_backend_abstraction"
demo-authority-fsm = "python -m examples.tutorial.d_closed_loop_state_feedback.03_operator_mode_and_authority_fsm"
demo-registry-basics = "python -m examples.tutorial.g_operations_interfaces.01_registry_basics"
demo-registry-ecosystem = "python -m examples.tutorial.g_operations_interfaces.02_registry_ecosystem"
demo-peripheral = "python -m examples.tutorial.g_operations_interfaces.04_peripheral"
