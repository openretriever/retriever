p0-release-readiness = "python -m examples.tutorial.c_debug_and_replay.06_trace_contract_basics && python -m examples.tutorial.h_release_readiness.01_run_manifest_and_lineage demo && python -m examples.tutorial.f_policy_backends.01_closed_loop_policy_backend_abstraction && python -m examples.tutorial.d_closed_loop_state_feedback.03_operator_mode_and_authority_fsm"
