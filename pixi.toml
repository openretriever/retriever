# =============================================================================
# Pixi Configuration for Retriever
# =============================================================================
#
# This file defines the pixi package manager configuration. It works alongside
# pyproject.toml - NOT a replacement for it.
#
# RELATIONSHIP WITH pyproject.toml:
#   - pyproject.toml: Defines the Python package (retriever) and its dependencies
#   - pixi.toml: Defines the development environment (conda + pypi packages)
#   - Pixi installs retriever from pyproject.toml as an editable package
#   - Both files may specify overlapping deps (e.g., dora-rs) - this is fine,
#     the more restrictive version wins
#
# USAGE:
#   pixi run demo-dora              # Run demo in default environment
#   pixi shell                      # Enter interactive shell
#
# For more info: https://pixi.sh and docs/install.md
# =============================================================================

[workspace]
# Using prefix.dev mirror for faster downloads
channels = ["https://prefix.dev/conda-forge"]
# Supported platforms: macOS ARM, Linux x64, and Windows x64
platforms = ["osx-arm64", "linux-64", "win-64"]

# =============================================================================
# Base Dependencies (installed via conda-forge)
# =============================================================================
[dependencies]
python = "3.11.*"
scipy = "*"
mujoco = "*"

# =============================================================================
# Optional Feature: Native Acceleration (Rust toolchain)
# =============================================================================
#
# This is intentionally NOT enabled in the default environment.
# Use: `pixi run -e native native-toolchain`
#
[feature.native.dependencies]
rust = "*"
maturin = "*"
cmake = "*"
pkg-config = "*"

[feature.jax.pypi-dependencies]
jax = "*"
jaxlib = "*"
flax = "*"
optax = "*"

# -----------------------------------------------------------------------------
# Environments
# -----------------------------------------------------------------------------
[environments]
default = { features = [] }
native = { features = ["native"] }
jax = { features = ["jax"] }
torch = { features = ["torch"] }

# =============================================================================
# PyPI Dependencies
# =============================================================================
# Note: These are installed via uv after conda deps are resolved
[pypi-dependencies]
# Install retriever package from local pyproject.toml.
# Keep the default environment lightweight, but include:
# - `dora`: dora backend support
# - `demo`: deps needed for the included examples (e.g. OpenCV + NumPy)
# - `web`: deps for web-based command interfaces (FastAPI)
# - `vision`: deps for real-time vision (PyTorch, Transformers)
retriever = { path = ".", editable = true, extras = [
    "dora",
    "demo",
    "web",
    "dora",
    "demo",
    "web",
    "recording",
] }
rerun-sdk = ">=0.21.0" # 0.21+ for better MCAP support
mcap = "*" # MCAP recording support

uvicorn = { extras = ["standard"], version = "*" }
# Test/runtime tooling (kept small; avoids pulling full `.[dev]` by default)
pygments = "*"
typing-extensions = "*"

# Dora-rs pinned here to ensure version compatibility.
# Note: The Retriever dora backend currently uses a dataflow schema that may require
# a newer `dora` CLI than the one available in some package managers. If `dora start`
# rejects the generated YAML, see docs/install.md for upgrade/build-from-source steps.
dora-rs = ">=0.3.12"
dora-rs-cli = ">=0.3.12"

# =============================================================================
# Tasks
# =============================================================================
[tasks]


# Native acceleration (Rust) helpers
native-toolchain = "rustc --version && cargo --version && maturin --version"

# Skill Switching Demo
# Run: pixi run demo-skill-switching
demo-skill-switching = { cmd = "python -m examples.advanced.skill_switching.main", env = { PYTHONPATH = "src" } }

[feature.jax.tasks]
# JAX Async Inference Demo
# Run: pixi run -e jax demo-jax-inference
demo-jax-inference = "python examples/advanced/jax_cuda_async/inference.py"

# JAX Async Training Demo
# Run: pixi run -e jax demo-jax-train
demo-jax-train = "python examples/advanced/jax_cuda_async/train.py"

# =============================================================================
# OPTIONAL FEATURE: PyTorch (Vision + VLA)
# =============================================================================
[feature.torch.pypi-dependencies]
torch = ">=2.0.0"
torchvision = "*"
transformers = "*"
pillow = "*"
openpi = "*"
timm = "*"

[feature.torch.tasks]
# Interactive Vision
# Run: pixi run -e torch demo-vision
demo-vision = "python examples/advanced/interactive_detection/app.py"

# VLA Web Command
# Run: pixi run -e torch demo-web
demo-web = "python examples/advanced/web_command_interface/app.py" # Uses vision flows? Check imports.

# OpenPI VLA Demo
# Run: pixi run -e torch demo-vla
demo-vla = "python examples/advanced/vla_inference_optim/app.py"

# Rerun Visualization (OwlViT + SAM)
# Run: pixi run -e torch demo-webcam-rerun
demo-webcam-rerun = "python examples/advanced/webcam_rerun/app.py"

# PyTorch Async Example
# Run: pixi run -e torch demo-pytorch-async
demo-pytorch-async = { cmd = "python examples/advanced/pytorch_cuda_async/app.py", env = { KMP_DUPLICATE_LIB_OK = "TRUE" } }

# Hierarchical VLA Demo (Robotics)
# Run: pixi run -e torch demo-hierarchical-vla
demo-hierarchical-vla = { cmd = "python examples/advanced/hierarchical_vla/app.py", env = { KMP_DUPLICATE_LIB_OK = "TRUE", PYTHONPATH = "." } }

# =============================================================================
# Native Controller Examples (Rust/C++)
# =============================================================================
# Requires: pixi run -e native <task>
#
# Native Python controller demo
# Run: pixi run -e native native-controller-python
native-controller-python = "python examples/advanced/native_controller/app.py --backend python"

# Build and run Rust controller
# Run: pixi run -e native native-controller-rust
native-build-rust = { cmd = "cargo build --release", cwd = "examples/advanced/native_controller" }
native-controller-rust = { cmd = "python examples/advanced/native_controller/app.py --backend rust", depends-on = [
    "native-build-rust",
] }

# Build and run C++ controller  
# Run: pixi run -e native native-controller-cpp
native-build-cpp = { cmd = "mkdir -p build && cd build && cmake .. && cmake --build .", cwd = "examples/advanced/native_controller" }
native-controller-cpp = { cmd = "python examples/advanced/native_controller/app.py --backend cpp", depends-on = [
    "native-build-cpp",
] }

# Run benchmark comparing all backends
# Run: pixi run -e native native-benchmark
native-benchmark = { cmd = "python examples/advanced/native_controller/benchmark.py", depends-on = [
    "native-build-rust",
    "native-build-cpp",
] }
