# =============================================================================
# Pixi Configuration for Retriever
# =============================================================================
#
# This file defines the pixi package manager configuration. It works alongside
# pyproject.toml - NOT a replacement for it.
#
# RELATIONSHIP WITH pyproject.toml:
#   - pyproject.toml: Defines the Python package (retriever) and its dependencies
#   - pixi.toml: Defines the development environment (conda + pypi packages)
#   - Pixi installs retriever from pyproject.toml as an editable package
#   - Both files may specify overlapping deps (e.g., dora-rs) - this is fine,
#     the more restrictive version wins
#
# USAGE:
#   pixi run demo-dora              # Run demo in default environment
#   pixi run -e cpu python train.py # Use CPU PyTorch environment
#   pixi run -e gpu python train.py # Use GPU PyTorch environment (Linux only)
#   pixi shell                      # Enter interactive shell
#
# For more info: https://pixi.sh and docs/install.md
# =============================================================================

[workspace]
# Using prefix.dev mirror for faster downloads
channels = ["https://prefix.dev/conda-forge"]
# Supported platforms: macOS ARM and Linux x64
platforms = ["osx-arm64", "linux-64"]

# =============================================================================
# Base Dependencies (installed via conda-forge)
# =============================================================================
[dependencies]
python = "3.11.*"
libheif = "*"  # Required for HEIF image format support

# =============================================================================
# PyPI Dependencies
# =============================================================================
# Note: These are installed via uv after conda deps are resolved
[pypi-dependencies]
# Install retriever package from local pyproject.toml with dora extra
# This pulls in all dependencies defined in pyproject.toml
retriever = { path = ".", editable = true, extras = ["dora"] }

# Dora-rs pinned here to ensure version compatibility.
# Note: The Retriever dora backend currently uses a dataflow schema that may require
# a newer `dora` CLI than the one available in some package managers. If `dora start`
# rejects the generated YAML, see docs/install.md for upgrade/build-from-source steps.
dora-rs = ">=0.3.12"
dora-rs-cli = ">=0.3.12"

# =============================================================================
# Tasks
# =============================================================================
[tasks]
demo-dora = "python -m examples.00_refact.009_dora_perception --backend dora"
demo-detection-dora = "python -m examples.00_refact.009_dora_perception --backend dora"
demo-request-dora = "python -m examples.00_refact.010_request_response"

# =============================================================================
# PyTorch Environments
# =============================================================================
# PyTorch is NOT in the default environment to keep it lightweight.
# Use -e cpu or -e gpu to activate a PyTorch environment.
#
# Reference: https://pixi.sh/dev/python/pytorch/

# GPU Environment: CUDA 12.4 for Linux
[feature.gpu]
platforms = ["linux-64"]  # CUDA only available on Linux
system-requirements = { cuda = "12.0" }  # Requires CUDA 12.0+ on the system

[feature.gpu.pypi-dependencies]
# Fetch from PyTorch's CUDA 12.4 index
torch = { version = ">=2.5.1", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = ">=0.20.1", index = "https://download.pytorch.org/whl/cu124" }

# CPU Environment: Works on all platforms
[feature.cpu.pypi-dependencies]
# Fetch from PyTorch's CPU index
torch = { version = ">=2.5.1", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.20.1", index = "https://download.pytorch.org/whl/cpu" }

# =============================================================================
# Environment Definitions
# =============================================================================
[environments]
# gpu: Linux only, includes CUDA 12.4 PyTorch
gpu = { features = ["gpu"] }
# cpu: All platforms, CPU-only PyTorch  
cpu = { features = ["cpu"] }
# default: No PyTorch (lightest, fastest to resolve)
