demo-closed-loop-env = "python -m examples.tutorial.d_closed_loop_state_feedback.01_closed_loop_env"
demo-stateful-reset = "python -m examples.tutorial.d_closed_loop_state_feedback.04_stateful_flow_reset"
demo-record-replay = "python -m examples.tutorial.c_debug_and_replay.04_record_replay_perception record --out logs/perception.rrd --replay-out logs/perception.mcap --steps 10 && python -m examples.tutorial.c_debug_and_replay.04_record_replay_perception replay --recording logs/perception.rrd --steps 10"
